# Phase Dependencies Template

# This file declares what files a sub-agent needs to read, modify, and create
# for this specific phase. Use this to reduce context cost when priming agents.

phase: [phase-name]
created: [timestamp]
schema: athena-default
feature: [feature-name]

# Files to READ (context loading)
# List files in priority order: critical → high → medium
dependencies:
  read:
    # Core documentation (always critical)
    - path: docs/project_specification.md
      reason: Understand overall architecture and requirements
      priority: critical

    # Reference materials (usually high priority)
    - path: .agent/references/[framework]-best-practices.md
      reason: Follow established patterns for [framework]
      priority: high
      llms_txt: .agent/references/llms.txt # Use LLM-friendly index

    # Persona protocols (high priority)
    - path: .agent/protocols/[persona]_identity.md
      reason: Load persona identity for [planning/design/implementation]
      priority: high

    # Existing code context (medium priority)
    - path: [path/to/existing/file.py]
      reason: Understand existing [model/service/component] structure
      priority: medium

  # Files to MODIFY (implementation targets)
  modify:
    - path: [path/to/file/to/modify.py]
      reason: [What changes to make]
      exclusive_lock: true # CRITICAL for parallel execution. Agent owns this file.
      changes: [Brief description of modifications]

  # Files to CREATE (new artifacts)
  create:
    - path: [path/to/new/file.py]
      reason: [Why creating this file]
      exclusive_lock: true # CRITICAL for parallel execution. Agent owns this file.
      template: .agent/templates/[template-name].py # Optional template reference

# Phase relationships
relationships:
  requires_phases:
    - [prerequisite-phase-name]
  provides_for_phases:
    - [dependent-phase-name]
  blocks_if_incomplete:
    - [phase-that-depends-on-this]

# Context budget estimation
context_estimate:
  read_tokens: [estimated-tokens]
  total_budget: 5000
  warning_threshold: 4000
  status: [ok|approaching_limit|over_budget]
  recommendation: [Optional: suggestions if approaching/over budget]
