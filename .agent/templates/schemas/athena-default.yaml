name: athena-default
description: Default Athena workflow with persona-driven development
version: 1.0.0

# Artifact dependency graph
# This schema defines the flow of artifacts in Athena workflows
# Dependencies are enablers, not gates - you can skip artifacts if not needed

artifacts:
  - id: constitution-check
    generates: constitution-check.md
    requires: []
    description: Verify project adheres to software engineering principles
    persona: Kairou
    optional: false

  - id: specification
    generates: docs/project_specification.md
    requires: [constitution-check]
    description: Product requirements and technical specification
    persona: Kairou
    optional: false

  - id: roadmap
    generates: .athena/roadmap.md
    requires: [specification]
    description: Phase breakdown with conversation boundaries
    persona: Kairou
    optional: false

  - id: phase-dependencies
    generates: .athena/changes/*/phases/*/dependencies.yaml
    requires: [roadmap]
    description: Per-phase file dependency schemas
    persona: Kairou
    optional: false

  - id: tasks
    generates: .athena/changes/*/phases/*/tasks.md
    requires: [phase-dependencies]
    description: Task breakdown with progress tracking
    persona: Kairou (auto-generated)
    optional: false

# Dependency visualization:
#
# constitution-check (root)
#         ↓
#   specification
#         ↓
#      roadmap
#         ↓
#  phase-dependencies
#         ↓
#      tasks
#
# Each artifact provides context for the next.
# Dependencies show what's possible to create, not what you must create next.
